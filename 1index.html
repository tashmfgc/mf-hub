<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MF Promo Hub — Musicians Friend</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080909;color:#EDEAE4;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080909;--surface:#0f1011;--card:#141516;--card2:#191b1c;--card3:#1e2022;
  --border:#222426;--border2:#2c2f31;--border3:#363a3d;
  --accent:#FF4500;--accent-dim:rgba(255,69,0,.1);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,.1);
  --green:#10B981;--green-dim:rgba(16,185,129,.1);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,.1);
  --violet:#8B5CF6;--violet-dim:rgba(139,92,246,.1);
  --rose:#F43F5E;--rose-dim:rgba(244,63,94,.1);
  --text:#EDEAE4;--muted:#6B7280;--dim:#3D4147;
  --r:8px;--rl:12px;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:228px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sb-mark{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-weight:800;font-size:16px;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
.sb-pip{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);flex-shrink:0;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 6px var(--accent)}50%{box-shadow:0 0 16px var(--accent)}}
.sb-sub{font-size:9px;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-grp{margin-bottom:2px}
.sb-grp-lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:8px 18px 3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:12.5px;color:var(--muted);transition:all .13s;border-left:2px solid transparent;user-select:none}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.022)}
.sb-item.active{color:var(--text);border-left-color:var(--accent);background:var(--accent-dim)}
.sb-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:8.5px;font-weight:700;padding:1px 6px;border-radius:8px}
.sb-live{margin-left:auto;font-size:8.5px;color:var(--green);background:var(--green-dim);padding:1px 6px;border-radius:4px;font-weight:700}
.sb-user{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF4500,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sb-un{font-size:12px;font-weight:500}
.sb-ur{font-size:9.5px;color:var(--muted)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px;flex-shrink:0}
.tb-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:14.5px;font-weight:700;letter-spacing:-.2px;flex:1}
.tb-crumb{font-size:11.5px;color:var(--muted);cursor:pointer}
.tb-crumb:hover{color:var(--text)}
.tb-sep{color:var(--dim);margin:0 3px;font-size:11px}
.page{flex:1;overflow-y:auto;padding:22px 26px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;font-weight:500;transition:all .14s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#d93c00;transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,69,0,.3)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,69,0,.25)}
.btn-violet{background:var(--violet-dim);color:var(--violet);border:1px solid rgba(139,92,246,.25)}

/* ── PANELS ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.panel-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.panel-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.panel-bd{padding:16px}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.pill-live{background:var(--green-dim);color:var(--green)}
.pill-draft{background:rgba(107,114,128,.12);color:var(--muted)}
.pill-review{background:var(--amber-dim);color:var(--amber)}
.pill-scheduled{background:var(--blue-dim);color:var(--blue)}
.pill-complete{background:rgba(107,114,128,.1);color:#556}
.pill-open{background:var(--accent-dim);color:var(--accent)}
.pill-inprog{background:var(--violet-dim);color:var(--violet)}
.pill-dot{width:4px;height:4px;border-radius:50%;background:currentColor}

/* ── KPI GRID ── */
.kpi-grid{display:grid;gap:12px;margin-bottom:20px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden}

.kpi-lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1.1px;margin-bottom:7px;font-weight:600}
.kpi-val{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.kpi-sub{font-size:10.5px;color:var(--muted);margin-top:4px}
.kpi-up{color:var(--green);font-weight:500}
.kpi-dn{color:var(--rose);font-weight:500}

/* ── LAYOUT ── */
.g-main{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.g-wide{display:grid;grid-template-columns:3fr 1.2fr;gap:16px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.tag{display:inline-flex;align-items:center;font-size:9.5px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}

/* ── CAMPAIGN CARDS ── */
.camp-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s}
.camp-row:last-child{border-bottom:none}
.camp-row:hover{background:rgba(255,255,255,.02)}
.camp-stripe{width:3px;height:38px;border-radius:2px;flex-shrink:0}
.camp-info{flex:1;min-width:0}
.camp-name{font-size:13px;font-weight:500;margin-bottom:2px}
.camp-meta{font-size:11px;color:var(--muted)}

/* ── CALENDAR ── */
.cal-grid-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 8px 0}
.cal-day-lbl{font-size:9px;text-align:center;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding-bottom:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 8px 8px}
.cal-cell{min-height:82px;background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:5px 6px;cursor:pointer;transition:border .13s;overflow:hidden}
.cal-cell:hover{border-color:var(--border2)}
.cal-cell.today{border-color:var(--accent)!important;background:var(--accent-dim)}
.cal-cell.other{opacity:.4}
.cal-dn{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:3px}
.cal-cell.today .cal-dn{color:var(--accent)}
.cal-chip{font-size:9px;font-weight:500;padding:2px 5px;border-radius:2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid currentColor;cursor:pointer}

/* ── EMAIL TABLE ── */
.ec-table{width:100%;border-collapse:collapse}
.ec-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:0;background:var(--card);z-index:1}
.ec-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.ec-table tr:last-child td{border-bottom:none}
.ec-table tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}
.ec-badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:3px}
.ec-ded{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,69,0,.2)}
.ec-feat{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.ec-trig{background:var(--violet-dim);color:var(--violet);border:1px solid rgba(139,92,246,.2)}
.ec-good{color:var(--green);font-weight:500}
.ec-avg{color:var(--amber);font-weight:500}
.ec-blank{color:var(--dim)}

/* ── TICKETS ── */
.tk-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start}
.tk-col-hd{display:flex;align-items:center;justify-content:space-between;padding:0 2px 8px}
.tk-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.tk-col-ct{width:18px;height:18px;border-radius:50%;background:var(--border);font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.tk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:all .14s;position:relative;overflow:hidden}
.tk-card::before{content:'';position:absolute;top:0;left:0;width:3px;bottom:0;background:var(--tc,var(--dim))}
.tk-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.25)}
.tk-id{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tk-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:7px}
.tk-camp{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);margin-bottom:5px}
.tk-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tk-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.tk-av{width:17px;height:17px;border-radius:50%;font-size:7.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tk-assignee{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.tk-due{font-size:9.5px}
.due-late{color:var(--rose)}
.due-soon{color:var(--amber)}
.due-ok{color:var(--muted)}

/* ── TASKS ── */
.task-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .13s}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-txt{flex:1;font-size:12.5px}
.task-txt.done{color:var(--dim);text-decoration:line-through}
.task-owner{font-size:9.5px;color:var(--muted);background:var(--card2);border:1px solid var(--border);padding:2px 7px;border-radius:8px}
.task-due{font-size:9.5px}

/* ── AUTOMATION ── */
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:9px;display:flex;align-items:flex-start;gap:12px}
.rule-toggle{width:34px;height:19px;border-radius:9px;flex-shrink:0;cursor:pointer;position:relative;transition:background .18s;margin-top:2px}
.rule-toggle.on{background:var(--green)}
.rule-toggle.off{background:var(--border2)}
.rule-pip{width:13px;height:13px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.rule-toggle.on .rule-pip{left:18px}
.rule-toggle.off .rule-pip{left:3px}
.rule-title{font-size:13px;font-weight:500;margin-bottom:3px}
.rule-desc{font-size:11.5px;color:var(--muted);line-height:1.5}
.rule-trigger{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:3px;background:var(--blue-dim);color:var(--blue);margin-right:5px;margin-top:5px}
.rule-action{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:3px;background:var(--violet-dim);color:var(--violet);margin-top:5px}

/* ── PERFORMANCE BARS ── */
.perf-row{margin-bottom:11px}
.perf-hdr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--muted)}
.perf-hdr span:last-child{color:var(--text);font-weight:500}
.perf-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.perf-fill{height:100%;border-radius:2px}

/* ── AI CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:520px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:14px}
.chat-bubble{max-width:84%;padding:11px 14px;border-radius:10px;font-size:12.5px;line-height:1.55}
.chat-bubble.ai{background:var(--card2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px}
.chat-bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.chat-sender{font-size:9px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.chat-input-row{display:flex;gap:7px;padding-top:12px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;outline:none;transition:border .14s}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--dim)}
.chat-send{background:var(--accent);border:none;border-radius:var(--r);width:38px;height:38px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .14s}
.chat-send:hover{background:#d93c00}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:700px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--card);z-index:1}
.modal-hd-body{flex:1}
.modal-id{font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:3px}
.modal-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:17px;font-weight:800;letter-spacing:-.3px}
.modal-close{background:var(--card2);border:1px solid var(--border);border-radius:5px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;flex-shrink:0;transition:color .13s}
.modal-close:hover{color:var(--text)}
.modal-bd{padding:20px 22px}
.field-row{display:grid;gap:9px;margin-bottom:12px}
.fr2{grid-template-columns:1fr 1fr}
.fr3{grid-template-columns:1fr 1fr 1fr}
.mfield{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.mfield-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-weight:600}
.mfield-val{font-size:12.5px;color:var(--text);line-height:1.4}
.mfield-val.mt{color:var(--muted);font-size:12px}
.tl{position:relative;padding-left:18px}
.tl::before{content:'';position:absolute;left:6px;top:5px;bottom:5px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-18px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.tl-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px var(--accent)}
.tl-lbl{font-size:12px;font-weight:500}
.tl-date{font-size:10.5px;color:var(--muted);margin-top:1px}

/* ── SYNC BANNER ── */
.sync-banner{background:linear-gradient(90deg,#0a130a,#0c1510);border:1px solid rgba(16,185,129,.18);border-radius:var(--rl);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── AI INSIGHT PANEL ── */
.ai-panel{background:linear-gradient(135deg,#0c0e1a,#0f1122);border:1px solid rgba(139,92,246,.18);border-radius:var(--rl);overflow:hidden}
.ai-panel .panel-hd{border-bottom-color:rgba(139,92,246,.15)}
.ai-ins{display:flex;gap:10px;padding-bottom:11px;margin-bottom:11px;border-bottom:1px solid rgba(139,92,246,.1)}
.ai-ins:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.ai-ins-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.ai-ins-title{font-size:12px;font-weight:500;margin-bottom:2px}
.ai-ins-text{font-size:11px;color:var(--muted);line-height:1.5}
.ai-cta{font-size:10.5px;color:#818cf8;cursor:pointer;margin-top:3px}

/* ── TICKET FORM TABS ── */
.tab-nav{display:flex;border-bottom:1px solid var(--border);padding-left:22px;background:var(--surface);flex-shrink:0}
.tab{padding:9px 16px;font-size:12.5px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .13s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
.form-section-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;margin-top:20px}
.form-section-hdr:first-child{margin-top:0}
.form-sec-icon{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.form-sec-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.form-divider{flex:1;height:1px;background:var(--border)}
.ffield{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border .14s}
.ffield:focus-within{border-color:var(--border3)}
.ffield-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-weight:600}
.ffield-input{background:transparent;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;width:100%;resize:none;line-height:1.5}
.ffield-input::placeholder{color:var(--dim)}
.ffield-select{background:transparent;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;width:100%;cursor:pointer}
.ffield-select option{background:var(--card2)}
.tchip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);color:var(--muted);background:var(--card3);cursor:pointer;transition:all .12s;margin:2px}
.tchip:hover{border-color:var(--border3);color:var(--text)}
.tchip.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(255,69,0,.3)}
.tchip.on-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.3)}
.tchip.on-green{background:var(--green-dim);color:var(--green);border-color:rgba(16,185,129,.3)}
.placement-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.placement-opt{border:1px solid var(--border);border-radius:var(--r);padding:8px;cursor:pointer;transition:all .13s;text-align:center}
.placement-opt:hover{border-color:var(--border2)}
.placement-opt.on{border-color:var(--accent);background:var(--accent-dim)}
.placement-opt-ico{font-size:15px;margin-bottom:2px}
.placement-opt-lbl{font-size:9.5px;color:var(--muted)}
.placement-opt.on .placement-opt-lbl{color:var(--accent)}
.spec-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.spec-table th{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:6px 9px;border-bottom:1px solid var(--border);text-align:left}
.spec-table td{padding:6px 9px;border-bottom:1px solid var(--border);font-size:11.5px;color:var(--muted);vertical-align:middle}
.spec-table tr:last-child td{border-bottom:none}
.spec-input{background:transparent;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;width:100%}
.spec-input::placeholder{color:var(--dim)}
.spec-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:8px;transition:all .12s}
.spec-check.done{background:var(--green);border-color:var(--green);color:#fff}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .14s;background:var(--card2)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-dim)}
.upload-file{display:flex;align-items:center;gap:9px;background:var(--card3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;margin-top:6px}
.status-track{display:flex;flex-direction:column;gap:0}
.status-step{display:flex;align-items:flex-start;gap:9px;padding-bottom:12px;position:relative}
.status-step:last-child{padding-bottom:0}
.status-step::before{content:'';position:absolute;left:8px;top:16px;bottom:0;width:1px;background:var(--border)}
.status-step:last-child::before{display:none}
.status-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;z-index:1}
.status-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.status-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px var(--accent)}
.status-step-lbl{font-size:11.5px;padding-top:0}
.status-step-date{font-size:10px;color:var(--muted);margin-top:1px}

</style>

/* ── PROMO CALENDAR ── */
function PromoCalendar({setNav, setCamp, campaigns, onUpdateCampaigns}){
  const [mo, setMo] = useState(0);
  const [addModal, setAddModal] = useState(false);
  const [editModal, setEditModal] = useState(null); // {campIdx, day}
  const [newPromo, setNewPromo] = useState({name:"",start:"",end:"",color:"#FF4500",status:"scheduled",owner:"",budget:"",target:"",goal:"",offer:"",audience:"",channels:[],tags:[],assets:[],timeline:[]});
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const cur = (2 + mo + 12) % 12;
  const COLORS = ["#FF4500","#F59E0B","#10B981","#3B82F6","#8B5CF6","#F43F5E","#06B6D4","#84CC16"];

  // Build dynamic calendar from live campaigns list
  const buildDynCal = () => {
    const days = [];
    for(let d=1; d<=31; d++){
      const promos = campaigns.filter(c=>{
        const startD = parseInt((c.start||"").replace(/[^0-9]/g,"").slice(-2)) || 0;
        const endD   = parseInt((c.end||"").replace(/[^0-9]/g,"").slice(-2)) || 0;
        const startMo = (c.start||"").toLowerCase();
        const endMo   = (c.end||"").toLowerCase();
        const inMar = startMo.includes("mar") || endMo.includes("mar");
        if(!inMar) return false;
        return d >= startD && d <= endD;
      }).map(c=>({name:c.name, color:c.color}));
      days.push({d, today:d===11, other:false, promos});
    }
    while(days.length < 35) days.push({d:days.length-30, today:false, other:true, promos:[]});
    return days;
  };
  const dynCal = buildDynCal();

  const saveNewPromo = () => {
    const np = {...newPromo, id: Date.now()};
    onUpdateCampaigns([...campaigns, np]);
    setAddModal(false);
    setNewPromo({name:"",start:"",end:"",color:"#FF4500",status:"scheduled",owner:"",budget:"",target:"",goal:"",offer:"",audience:"",channels:[],tags:[],assets:[],timeline:[]});
  };

  const removeCampaign = (id) => {
    onUpdateCampaigns(campaigns.filter(c=>c.id!==id));
  };

  const coverage = Math.round((dynCal.filter(d=>!d.other && d.promos.length>0).length / 31)*100);
  const nextLaunch = campaigns.filter(c=>c.status==="scheduled").sort((a,b)=>(parseInt((a.start||"").replace(/[^0-9]/g,""))||0)-(parseInt((b.start||"").replace(/[^0-9]/g,""))||0))[0];

  return(
    <>
      <div className="kpi-grid g3 mb20">
        {[
          {l:"Promos This Month",v:campaigns.length,s:`${campaigns.filter(c=>c.status==="live").length} live · ${campaigns.filter(c=>c.status==="scheduled").length} scheduled`,c:"#FF4500"},
          {l:"Calendar Coverage",v:`${coverage}%`,s:"of days have promo activity",c:"#10B981"},
          {l:"Next Launch",v:nextLaunch?nextLaunch.start:"—",s:nextLaunch?nextLaunch.name:"No upcoming launches",c:"#3B82F6"}
        ].map((k,i)=>(
          <div className="kpi" key={i} ><div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:k.c}}/>  <div className="kpi-lbl">{k.l}</div><div className="kpi-val">{k.v}</div><div className="kpi-sub">{k.s}</div></div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMo(m=>m-1)}>◀</button>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,letterSpacing:"-.5px",minWidth:160}}>{months[cur]} 2026</span>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMo(m=>m+1)}>▶</button>
        <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={()=>setAddModal(true)}>+ Add Promo</button>
      </div>
      <div className="g-main" style={{alignItems:"start"}}>
        <div className="panel">
          <div className="cal-grid-hdr">{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} className="cal-day-lbl">{d}</div>)}</div>
          <div className="cal-grid">
            {dynCal.map((cell,i)=>(
              <div key={i} className={`cal-cell${cell.today?" today":""}${cell.other?" other":""}`}>
                <div className="cal-dn">{cell.d}</div>
                {cell.promos.slice(0,2).map((p,j)=>(
                  <div key={j} className="cal-chip" style={{color:p.color,background:p.color+"16"}}
                    onClick={()=>{const c=campaigns.find(x=>x.name===p.name);if(c){setCamp(c);setNav("campaign-detail");}}}>

function EditableField({value, onChange, multiline=false, style={}}){
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = React.useRef();
  useEffect(()=>{ if(editing && ref.current) ref.current.focus(); },[editing]);
  if(editing) {
    const props = {
      ref, value:val,
      onChange:e=>setVal(e.target.value),
      onBlur:()=>{ setEditing(false); onChange(val); },
      onKeyDown:e=>{ if(!multiline && e.key==="Enter"){ setEditing(false); onChange(val); } if(e.key==="Escape"){ setEditing(false); setVal(value); }},
      style:{background:"transparent",border:"none",borderBottom:"1px solid var(--accent)",outline:"none",color:"var(--text)",fontFamily:"inherit",fontSize:"inherit",fontWeight:"inherit",width:"100%",padding:"1px 2px",resize:"none",lineHeight:1.5,...style}
    };
    return multiline ? <textarea {...props} rows={3}/> : <input {...props}/>;
  }
  return <span onClick={()=>setEditing(true)} title="Click to edit" style={{cursor:"text",borderBottom:"1px dashed var(--border2)",paddingBottom:1,...style}}>{val||<span style={{color:"var(--dim)"}}>Click to edit…</span>}</span>;
}

}

/* ── AI ASSISTANT ── */
function AIAssistant(){
  const [chat,setChat]=useState(CHAT_INIT);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const QUICK=["What's our best Q4 performer?","Find calendar gaps in April","Draft Spring Guitar email subject lines","Summarize Drum Kit Blowout performance","What campaigns need design tickets?"];
  const send=(msg)=>{
    if(!msg.trim()) return;
    setChat(c=>[...c,{role:"user",text:msg}]);
    setInput("");
    setLoading(true);
    setTimeout(()=>{
      setChat(c=>[...c,{role:"ai",text:"Based on your current promotional calendar and past performance data, here's what I found: The Drum Kit Blowout is your strongest active campaign at 23% above CTR benchmarks. For Spring Guitar Sale, I recommend a 3-touch email drip — launch, mid-point urgency, and last-chance — similar to the Holiday Bundle structure from Q4 which drove $2.1M. Want me to generate the full campaign brief or draft the email subject lines?"}]);
      setLoading(false);
    },900);
  };
  return(
    <div style={{maxWidth:740}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {QUICK.map(q=><button key={q} className="btn btn-ghost btn-sm" onClick={()=>send(q)} style={{fontSize:11}}>{q}</button>)}
      </div>
      <div className="panel">
        <div className="panel-hd"><div className="panel-title" style={{color:"#a78bfa"}}>🤖 Promo Intelligence — AI Assistant</div></div>
        <div className="panel-bd">
          <div className="chat-wrap">
            <div className="chat-msgs">
              {chat.map((m,i)=>(
                <div key={i} className={`chat-bubble ${m.role}`}>
                  {m.role==="ai"&&<div className="chat-sender">Promo AI</div>}
                  {m.text}
                </div>
              ))}
              {loading&&<div className="chat-bubble ai"><div className="chat-sender">Promo AI</div><span style={{color:"var(--dim)"}}>Thinking…</span></div>}
            </div>
            <div className="chat-input-row">
              <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} placeholder="Ask about campaigns, gaps, copy, performance, tickets…"/>
              <button className="chat-send" onClick={()=>send(input)}>↑</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

const NAV_GROUPS=[
  {label:"Core",items:[{id:"dashboard",icon:"⬛",label:"Dashboard"},{id:"calendar",icon:"📅",label:"Promo Calendar"},{id:"campaigns",icon:"📋",label:"Campaigns",badge:"4"}]},
  {label:"Email",items:[{id:"email",icon:"📧",label:"Email Cadence",live:true}]},
  {label:"Workflow",items:[{id:"tickets",icon:"🎫",label:"Tickets",badge:"3"},{id:"tasks",icon:"✅",label:"Tasks",badge:"6"},{id:"automation",icon:"⚡",label:"Automation"}]},
  {label:"Insights",items:[{id:"performance",icon:"📊",label:"Performance"},{id:"ai",icon:"🤖",label:"AI Assistant"}]},
];
const PAGE_TITLES={dashboard:"Dashboard",calendar:"Promo Calendar",campaigns:"Campaigns","campaign-detail":"Campaign",email:"Email Cadence",tickets:"Tickets",tasks:"Tasks",automation:"Automation",performance:"Performance",ai:"AI Assistant"};

function App(){
  const [nav,setNav]=useState("dashboard");
  const [camp,setCamp]=useState(null);

  const title=()=>{
    if(nav==="campaign-detail"&&camp) return <><span className="tb-crumb" onClick={()=>setNav("campaigns")}>Campaigns</span><span className="tb-sep">/</span><span style={{fontSize:12,color:"var(--text)"}}>{camp.name}</span></>;
    return PAGE_TITLES[nav]||nav;
  };

  return(
    <>
      <div className="app">
        {/* SIDEBAR */}
        <div className="sb">
          <div className="sb-logo">
            <div className="sb-mark"><span className="sb-pip"/>MF Promo Hub</div>
            <div className="sb-sub">Musicians Friend</div>
          </div>
          <nav className="sb-nav">
            {NAV_GROUPS.map(g=>(
              <div className="sb-grp" key={g.label}>
                <div className="sb-grp-lbl">{g.label}</div>
                {g.items.map(item=>(
                  <div key={item.id} className={`sb-item${(nav===item.id||(nav==="campaign-detail"&&item.id==="campaigns"))?" active":""}`} onClick={()=>setNav(item.id)}>
                    <span className="sb-ico">{item.icon}</span>
                    {item.label}
                    {item.badge&&<span className="sb-badge">{item.badge}</span>}
                    {item.live&&<span className="sb-live">LIVE</span>}
                  </div>
                ))}
              </div>
            ))}
          </nav>
          <div className="sb-user">
            <div className="sb-av">JR</div>
            <div><div className="sb-un">Jamie R.</div><div className="sb-ur">Campaign Manager</div></div>
          </div>
        </div>

        {/* MAIN */}
        <div className="main">
          <div className="topbar">
            <div className="tb-title">{title()}</div>
            <span style={{fontSize:11,color:"var(--muted)"}}>March 2026</span>
            {nav==="email"&&<span style={{fontSize:10.5,color:"var(--green)",display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:"var(--green)"}}/> Synced</span>}
            <button className="btn btn-ghost btn-sm">Export</button>
            <button className="btn btn-primary btn-sm" onClick={()=>setNav("campaigns")}>+ New Campaign</button>
          </div>
          <div className="page">
            {nav==="dashboard"&&<Dashboard setNav={setNav} setCamp={setCamp}/>}
            {nav==="calendar"&&<PromoCalendar setNav={setNav} setCamp={setCamp}/>}
            {nav==="campaigns"&&<CampaignsList setNav={setNav} setCamp={setCamp}/>}
            {nav==="campaign-detail"&&<CampaignDetail campaign={camp} setNav={setNav}/>}
            {nav==="email"&&<EmailCadence/>}
            {nav==="tickets"&&<Tickets/>}
            {nav==="tasks"&&<Tasks/>}
            {nav==="automation"&&<Automation/>}
            {nav==="ai"&&<AIAssistant/>}
            {nav==="performance"&&<Performance/>}
          </div>
        </div>
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App, null));
</script>
</body>
</html>
