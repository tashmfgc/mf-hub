<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MF Promo Hub — Musicians Friend</title>
<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#080909;color:#EDEAE4;-webkit-font-smoothing:antialiased}
:root{
  --bg:#080909;--surface:#0f1011;--card:#141516;--card2:#191b1c;--card3:#1e2022;
  --border:#222426;--border2:#2c2f31;--border3:#363a3d;
  --accent:#FF4500;--accent-dim:rgba(255,69,0,.1);
  --amber:#F59E0B;--amber-dim:rgba(245,158,11,.1);
  --green:#10B981;--green-dim:rgba(16,185,129,.1);
  --blue:#3B82F6;--blue-dim:rgba(59,130,246,.1);
  --violet:#8B5CF6;--violet-dim:rgba(139,92,246,.1);
  --rose:#F43F5E;--rose-dim:rgba(244,63,94,.1);
  --text:#EDEAE4;--muted:#6B7280;--dim:#3D4147;
  --r:8px;--rl:12px;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
.app{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sb{width:228px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.sb-logo{padding:20px 18px 16px;border-bottom:1px solid var(--border)}
.sb-mark{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-weight:800;font-size:16px;letter-spacing:-.4px;display:flex;align-items:center;gap:8px}
.sb-pip{width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);flex-shrink:0;animation:glow 3s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 6px var(--accent)}50%{box-shadow:0 0 16px var(--accent)}}
.sb-sub{font-size:9px;color:var(--muted);letter-spacing:1.8px;text-transform:uppercase;margin-top:2px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 0}
.sb-grp{margin-bottom:2px}
.sb-grp-lbl{font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);padding:8px 18px 3px}
.sb-item{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;font-size:12.5px;color:var(--muted);transition:all .13s;border-left:2px solid transparent;user-select:none}
.sb-item:hover{color:var(--text);background:rgba(255,255,255,.022)}
.sb-item.active{color:var(--text);border-left-color:var(--accent);background:var(--accent-dim)}
.sb-ico{font-size:13px;width:18px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--accent);color:#fff;font-size:8.5px;font-weight:700;padding:1px 6px;border-radius:8px}
.sb-live{margin-left:auto;font-size:8.5px;color:var(--green);background:var(--green-dim);padding:1px 6px;border-radius:4px;font-weight:700}
.sb-user{padding:12px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:9px}
.sb-av{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#FF4500,#FF8C42);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.sb-un{font-size:12px;font-weight:500}
.sb-ur{font-size:9.5px;color:var(--muted)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:54px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:10px;flex-shrink:0}
.tb-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:14.5px;font-weight:700;letter-spacing:-.2px;flex:1}
.tb-crumb{font-size:11.5px;color:var(--muted);cursor:pointer}
.tb-crumb:hover{color:var(--text)}
.tb-sep{color:var(--dim);margin:0 3px;font-size:11px}
.page{flex:1;overflow-y:auto;padding:22px 26px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);border:none;cursor:pointer;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12px;font-weight:500;transition:all .14s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#d93c00;transform:translateY(-1px);box-shadow:0 4px 14px rgba(255,69,0,.3)}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-ghost:hover{color:var(--text);border-color:var(--border2)}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}
.btn-active{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,69,0,.25)}
.btn-violet{background:var(--violet-dim);color:var(--violet);border:1px solid rgba(139,92,246,.25)}

/* ── PANELS ── */
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);overflow:hidden}
.panel-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-shrink:0}
.panel-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.panel-bd{padding:16px}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;gap:4px;font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.4px;text-transform:uppercase;white-space:nowrap}
.pill-live{background:var(--green-dim);color:var(--green)}
.pill-draft{background:rgba(107,114,128,.12);color:var(--muted)}
.pill-review{background:var(--amber-dim);color:var(--amber)}
.pill-scheduled{background:var(--blue-dim);color:var(--blue)}
.pill-complete{background:rgba(107,114,128,.1);color:#556}
.pill-open{background:var(--accent-dim);color:var(--accent)}
.pill-inprog{background:var(--violet-dim);color:var(--violet)}
.pill-dot{width:4px;height:4px;border-radius:50%;background:currentColor}

/* ── KPI GRID ── */
.kpi-grid{display:grid;gap:12px;margin-bottom:20px}
.g4{grid-template-columns:repeat(4,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g2{grid-template-columns:1fr 1fr}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;position:relative;overflow:hidden}

.kpi-lbl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:1.1px;margin-bottom:7px;font-weight:600}
.kpi-val{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:26px;font-weight:800;letter-spacing:-1.5px;line-height:1}
.kpi-sub{font-size:10.5px;color:var(--muted);margin-top:4px}
.kpi-up{color:var(--green);font-weight:500}
.kpi-dn{color:var(--rose);font-weight:500}

/* ── LAYOUT ── */
.g-main{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.g-wide{display:grid;grid-template-columns:3fr 1.2fr;gap:16px}
.mb12{margin-bottom:12px}
.mb16{margin-bottom:16px}
.mb20{margin-bottom:20px}
.tag{display:inline-flex;align-items:center;font-size:9.5px;padding:2px 7px;border-radius:3px;background:rgba(255,255,255,.05);color:var(--muted);border:1px solid var(--border)}

/* ── CAMPAIGN CARDS ── */
.camp-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .13s}
.camp-row:last-child{border-bottom:none}
.camp-row:hover{background:rgba(255,255,255,.02)}
.camp-stripe{width:3px;height:38px;border-radius:2px;flex-shrink:0}
.camp-info{flex:1;min-width:0}
.camp-name{font-size:13px;font-weight:500;margin-bottom:2px}
.camp-meta{font-size:11px;color:var(--muted)}

/* ── CALENDAR ── */
.cal-grid-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:8px 8px 0}
.cal-day-lbl{font-size:9px;text-align:center;color:var(--dim);text-transform:uppercase;letter-spacing:1px;padding-bottom:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 8px 8px}
.cal-cell{min-height:82px;background:var(--card2);border:1px solid var(--border);border-radius:5px;padding:5px 6px;cursor:pointer;transition:border .13s;overflow:hidden}
.cal-cell:hover{border-color:var(--border2)}
.cal-cell.today{border-color:var(--accent)!important;background:var(--accent-dim)}
.cal-cell.other{opacity:.4}
.cal-dn{font-size:10.5px;font-weight:600;color:var(--muted);margin-bottom:3px}
.cal-cell.today .cal-dn{color:var(--accent)}
.cal-chip{font-size:9px;font-weight:500;padding:2px 5px;border-radius:2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-left:2px solid currentColor;cursor:pointer}

/* ── EMAIL TABLE ── */
.ec-table{width:100%;border-collapse:collapse}
.ec-table th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:9px 12px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:0;background:var(--card);z-index:1}
.ec-table td{padding:9px 12px;border-bottom:1px solid var(--border);font-size:12px;vertical-align:top}
.ec-table tr:last-child td{border-bottom:none}
.ec-table tr:hover td{background:rgba(255,255,255,.015);cursor:pointer}
.ec-badge{display:inline-flex;align-items:center;gap:4px;font-size:9.5px;font-weight:600;padding:2px 8px;border-radius:3px}
.ec-ded{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(255,69,0,.2)}
.ec-feat{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(59,130,246,.2)}
.ec-trig{background:var(--violet-dim);color:var(--violet);border:1px solid rgba(139,92,246,.2)}
.ec-good{color:var(--green);font-weight:500}
.ec-avg{color:var(--amber);font-weight:500}
.ec-blank{color:var(--dim)}

/* ── TICKETS ── */
.tk-board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:start}
.tk-col-hd{display:flex;align-items:center;justify-content:space-between;padding:0 2px 8px}
.tk-col-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.tk-col-ct{width:18px;height:18px;border-radius:50%;background:var(--border);font-size:9.5px;font-weight:700;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.tk-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:all .14s;position:relative;overflow:hidden}
.tk-card::before{content:'';position:absolute;top:0;left:0;width:3px;bottom:0;background:var(--tc,var(--dim))}
.tk-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.25)}
.tk-id{font-size:9px;color:var(--dim);font-weight:700;letter-spacing:.5px;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.tk-title{font-size:12px;font-weight:500;line-height:1.4;margin-bottom:7px}
.tk-camp{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--muted);margin-bottom:5px}
.tk-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tk-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;padding-top:7px;border-top:1px solid var(--border)}
.tk-av{width:17px;height:17px;border-radius:50%;font-size:7.5px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tk-assignee{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.tk-due{font-size:9.5px}
.due-late{color:var(--rose)}
.due-soon{color:var(--amber)}
.due-ok{color:var(--muted)}

/* ── TASKS ── */
.task-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:16px;height:16px;border-radius:4px;border:1.5px solid var(--border2);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;transition:all .13s}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-txt{flex:1;font-size:12.5px}
.task-txt.done{color:var(--dim);text-decoration:line-through}
.task-owner{font-size:9.5px;color:var(--muted);background:var(--card2);border:1px solid var(--border);padding:2px 7px;border-radius:8px}
.task-due{font-size:9.5px}

/* ── AUTOMATION ── */
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:var(--rl);padding:14px 16px;margin-bottom:9px;display:flex;align-items:flex-start;gap:12px}
.rule-toggle{width:34px;height:19px;border-radius:9px;flex-shrink:0;cursor:pointer;position:relative;transition:background .18s;margin-top:2px}
.rule-toggle.on{background:var(--green)}
.rule-toggle.off{background:var(--border2)}
.rule-pip{width:13px;height:13px;border-radius:50%;background:#fff;position:absolute;top:3px;transition:left .18s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.rule-toggle.on .rule-pip{left:18px}
.rule-toggle.off .rule-pip{left:3px}
.rule-title{font-size:13px;font-weight:500;margin-bottom:3px}
.rule-desc{font-size:11.5px;color:var(--muted);line-height:1.5}
.rule-trigger{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:3px;background:var(--blue-dim);color:var(--blue);margin-right:5px;margin-top:5px}
.rule-action{display:inline-flex;font-size:10px;padding:2px 8px;border-radius:3px;background:var(--violet-dim);color:var(--violet);margin-top:5px}

/* ── PERFORMANCE BARS ── */
.perf-row{margin-bottom:11px}
.perf-hdr{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;color:var(--muted)}
.perf-hdr span:last-child{color:var(--text);font-weight:500}
.perf-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.perf-fill{height:100%;border-radius:2px}

/* ── AI CHAT ── */
.chat-wrap{display:flex;flex-direction:column;height:520px}
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px;padding-bottom:14px}
.chat-bubble{max-width:84%;padding:11px 14px;border-radius:10px;font-size:12.5px;line-height:1.55}
.chat-bubble.ai{background:var(--card2);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px}
.chat-bubble.user{background:var(--accent);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.chat-sender{font-size:9px;color:var(--accent);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px}
.chat-input-row{display:flex;gap:7px;padding-top:12px;border-top:1px solid var(--border)}
.chat-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:9px 12px;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;outline:none;transition:border .14s}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--dim)}
.chat-send{background:var(--accent);border:none;border-radius:var(--r);width:38px;height:38px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .14s}
.chat-send:hover{background:#d93c00}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:var(--rl);width:100%;max-width:700px;max-height:88vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-hd{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--card);z-index:1}
.modal-hd-body{flex:1}
.modal-id{font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:.5px;margin-bottom:3px}
.modal-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:17px;font-weight:800;letter-spacing:-.3px}
.modal-close{background:var(--card2);border:1px solid var(--border);border-radius:5px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:14px;flex-shrink:0;transition:color .13s}
.modal-close:hover{color:var(--text)}
.modal-bd{padding:20px 22px}
.field-row{display:grid;gap:9px;margin-bottom:12px}
.fr2{grid-template-columns:1fr 1fr}
.fr3{grid-template-columns:1fr 1fr 1fr}
.mfield{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px}
.mfield-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-weight:600}
.mfield-val{font-size:12.5px;color:var(--text);line-height:1.4}
.mfield-val.mt{color:var(--muted);font-size:12px}
.tl{position:relative;padding-left:18px}
.tl::before{content:'';position:absolute;left:6px;top:5px;bottom:5px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:14px}
.tl-dot{position:absolute;left:-18px;top:3px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px}
.tl-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.tl-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px var(--accent)}
.tl-lbl{font-size:12px;font-weight:500}
.tl-date{font-size:10.5px;color:var(--muted);margin-top:1px}

/* ── SYNC BANNER ── */
.sync-banner{background:linear-gradient(90deg,#0a130a,#0c1510);border:1px solid rgba(16,185,129,.18);border-radius:var(--rl);padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:18px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green);flex-shrink:0;animation:pulse 2.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── AI INSIGHT PANEL ── */
.ai-panel{background:linear-gradient(135deg,#0c0e1a,#0f1122);border:1px solid rgba(139,92,246,.18);border-radius:var(--rl);overflow:hidden}
.ai-panel .panel-hd{border-bottom-color:rgba(139,92,246,.15)}
.ai-ins{display:flex;gap:10px;padding-bottom:11px;margin-bottom:11px;border-bottom:1px solid rgba(139,92,246,.1)}
.ai-ins:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.ai-ins-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.ai-ins-title{font-size:12px;font-weight:500;margin-bottom:2px}
.ai-ins-text{font-size:11px;color:var(--muted);line-height:1.5}
.ai-cta{font-size:10.5px;color:#818cf8;cursor:pointer;margin-top:3px}

/* ── TICKET FORM TABS ── */
.tab-nav{display:flex;border-bottom:1px solid var(--border);padding-left:22px;background:var(--surface);flex-shrink:0}
.tab{padding:9px 16px;font-size:12.5px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;transition:all .13s;margin-bottom:-1px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--text);border-bottom-color:var(--accent);font-weight:500}
.form-section-hdr{display:flex;align-items:center;gap:9px;margin-bottom:12px;margin-top:20px}
.form-section-hdr:first-child{margin-top:0}
.form-sec-icon{width:26px;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.form-sec-title{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-weight:800;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px}
.form-divider{flex:1;height:1px;background:var(--border)}
.ffield{background:var(--card2);border:1px solid var(--border);border-radius:var(--r);padding:10px 12px;transition:border .14s}
.ffield:focus-within{border-color:var(--border3)}
.ffield-lbl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:4px;font-weight:600}
.ffield-input{background:transparent;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;width:100%;resize:none;line-height:1.5}
.ffield-input::placeholder{color:var(--dim)}
.ffield-select{background:transparent;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:12.5px;width:100%;cursor:pointer}
.ffield-select option{background:var(--card2)}
.tchip{display:inline-flex;align-items:center;gap:4px;font-size:10px;padding:3px 9px;border-radius:4px;border:1px solid var(--border2);color:var(--muted);background:var(--card3);cursor:pointer;transition:all .12s;margin:2px}
.tchip:hover{border-color:var(--border3);color:var(--text)}
.tchip.on{background:var(--accent-dim);color:var(--accent);border-color:rgba(255,69,0,.3)}
.tchip.on-blue{background:var(--blue-dim);color:var(--blue);border-color:rgba(59,130,246,.3)}
.tchip.on-green{background:var(--green-dim);color:var(--green);border-color:rgba(16,185,129,.3)}
.placement-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.placement-opt{border:1px solid var(--border);border-radius:var(--r);padding:8px;cursor:pointer;transition:all .13s;text-align:center}
.placement-opt:hover{border-color:var(--border2)}
.placement-opt.on{border-color:var(--accent);background:var(--accent-dim)}
.placement-opt-ico{font-size:15px;margin-bottom:2px}
.placement-opt-lbl{font-size:9.5px;color:var(--muted)}
.placement-opt.on .placement-opt-lbl{color:var(--accent)}
.spec-table{width:100%;border-collapse:collapse;margin-bottom:8px}
.spec-table th{font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--dim);padding:6px 9px;border-bottom:1px solid var(--border);text-align:left}
.spec-table td{padding:6px 9px;border-bottom:1px solid var(--border);font-size:11.5px;color:var(--muted);vertical-align:middle}
.spec-table tr:last-child td{border-bottom:none}
.spec-input{background:transparent;border:none;outline:none;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:11.5px;width:100%}
.spec-input::placeholder{color:var(--dim)}
.spec-check{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:8px;transition:all .12s}
.spec-check.done{background:var(--green);border-color:var(--green);color:#fff}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;transition:all .14s;background:var(--card2)}
.upload-zone:hover{border-color:var(--accent);background:var(--accent-dim)}
.upload-file{display:flex;align-items:center;gap:9px;background:var(--card3);border:1px solid var(--border);border-radius:var(--r);padding:7px 10px;margin-top:6px}
.status-track{display:flex;flex-direction:column;gap:0}
.status-step{display:flex;align-items:flex-start;gap:9px;padding-bottom:12px;position:relative}
.status-step:last-child{padding-bottom:0}
.status-step::before{content:'';position:absolute;left:8px;top:16px;bottom:0;width:1px;background:var(--border)}
.status-step:last-child::before{display:none}
.status-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0;z-index:1}
.status-dot.done{background:var(--green);border-color:var(--green);color:#fff}
.status-dot.active{background:var(--accent);border-color:var(--accent);box-shadow:0 0 7px var(--accent)}
.status-step-lbl{font-size:11.5px;padding-top:0}
.status-step-date{font-size:10px;color:var(--muted);margin-top:1px}

</style>

/* ── PROMO CALENDAR ── */
// ── PROMO TYPE SYSTEM ──
const PROMO_TYPES = [
  {id:"holiday",     label:"Holiday Tentpole",  color:"#EF4444", desc:"Major holiday-driven events: Black Friday, Christmas, Mother's Day"},
  {id:"tentpole",    label:"Brand Tentpole",     color:"#FF4500", desc:"Major brand events not holiday-dependent: Guitar Fest, Spring Sale"},
  {id:"supporting",  label:"Supporting Promo",   color:"#3B82F6", desc:"Smaller promos running alongside tentpoles"},
  {id:"sweeps-web",  label:"Web Sweepstakes",    color:"#8B5CF6", desc:"Sweepstakes tied to MF landing page — web + email"},
  {id:"sweeps-social",label:"Social Sweepstakes",color:"#EC4899", desc:"Social-only sweepstakes, no landing page"},
  {id:"collab",      label:"Partner / Collab",   color:"#06B6D4", desc:"Co-branded or partner-driven campaigns"},
];
const promoTypeColor = (type) => PROMO_TYPES.find(t=>t.id===type)?.color || "#FF4500";

// AI-suggested cultural/music holidays
const AI_HOLIDAYS = [
  {d:8,  label:"Intl Women's Day", icon:"♀", note:"Intl Women in Music Day opportunity"},
  {d:14, label:"Pi Day", icon:"π", note:"Math meets music"},
  {d:20, label:"World Storytelling Day", icon:"📖", note:"Content opportunity"},
  {d:21, label:"World Poetry Day", icon:"🎵", note:"Lyric/music tie-in"},
  {d:25, label:"Tolkien Reading Day", icon:"📚", note:"Fantasy/epic music"},
];

function PromoCalendar({setNav, setCamp, campaigns=[], onUpdateCampaigns=()=>{}}){
  const [mo, setMo] = useState(0);
  const [addModal, setAddModal] = useState(false);
  const [dayModal, setDayModal] = useState(null); // clicked day number
  const [dayModalType, setDayModalType] = useState("campaign"); // "campaign" | "promo"
  const [showLegend, setShowLegend] = useState(false);
  const [confirmedHolidays, setConfirmedHolidays] = useState([]);
  const [newPromo, setNewPromo] = useState({name:"",start:"",end:"",color:"#FF4500",promoType:"tentpole",status:"planning",owner:"",target:"",goal:"",offer:"",audience:"",channels:[],tags:[],assets:[],timeline:[]});
  const months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const cur = (2 + mo + 12) % 12;

  // Build dynamic calendar from live campaigns list
  const buildDynCal = () => {
    const days = [];
    for(let d=1; d<=31; d++){
      const promos = campaigns.filter(c=>{
        const startD = parseInt((c.start||"").replace(/[^0-9]/g,"").slice(-2)) || 0;
        const endD   = parseInt((c.end||"").replace(/[^0-9]/g,"").slice(-2)) || 0;
        const startMo = (c.start||"").toLowerCase();
        const endMo   = (c.end||"").toLowerCase();
        const inMar = startMo.includes("mar") || endMo.includes("mar");
        if(!inMar) return false;
        return d >= startD && d <= endD;
      }).map(c=>({name:c.name, color:c.color}));
      days.push({d, today:d===11, other:false, promos});
    }
    while(days.length < 35) days.push({d:days.length-30, today:false, other:true, promos:[]});
    return days;
  };
  const dynCal = buildDynCal();
  if(!campaigns) return <div style={{color:"var(--muted)",padding:40}}>Loading…</div>;

  const saveNewPromo = () => {
    const color = promoTypeColor(newPromo.promoType)||newPromo.color;
    const np = {...newPromo, id:Date.now(), color};
    onUpdateCampaigns([...campaigns, np]);
    setAddModal(false);
    setDayModal(null);
    setNewPromo({name:"",start:"",end:"",color:"#FF4500",promoType:"tentpole",status:"planning",owner:"",target:"",goal:"",offer:"",audience:"",channels:[],tags:[],assets:[],timeline:[]});
  };

  const removeCampaign = (id) => {
    onUpdateCampaigns(campaigns.filter(c=>c.id!==id));
  };

  const coverage = Math.round((dynCal.filter(d=>!d.other && d.promos.length>0).length / 31)*100);
  const nextLaunch = campaigns.filter(c=>c.status==="scheduled").sort((a,b)=>(parseInt((a.start||"").replace(/[^0-9]/g,""))||0)-(parseInt((b.start||"").replace(/[^0-9]/g,""))||0))[0];

  return(
    <>
      <div className="kpi-grid g3 mb20">
        {[
          {l:"Promos This Month",v:campaigns.length,s:`${campaigns.filter(c=>c.status==="live").length} live · ${campaigns.filter(c=>c.status==="scheduled").length} scheduled`,c:"#FF4500"},
          {l:"Calendar Coverage",v:`${coverage}%`,s:"of days have promo activity",c:"#10B981"},
          {l:"Next Launch",v:nextLaunch?nextLaunch.start:"—",s:nextLaunch?nextLaunch.name:"No upcoming launches",c:"#3B82F6"}
        ].map((k,i)=>(
          <div className="kpi" key={i} ><div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:k.c}}/>  <div className="kpi-lbl">{k.l}</div><div className="kpi-val">{k.v}</div><div className="kpi-sub">{k.s}</div></div>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMo(m=>m-1)}>◀</button>
        <span style={{fontFamily:"'Syne',sans-serif",fontSize:18,fontWeight:800,letterSpacing:"-.5px",minWidth:160}}>{months[cur]} 2026</span>
        <button className="btn btn-ghost btn-sm" onClick={()=>setMo(m=>m+1)}>▶</button>
        <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={()=>setAddModal(true)}>+ Add Promo</button>
      </div>
      <div className="g-main" style={{alignItems:"start"}}>
        <div className="panel">
          <div className="cal-grid-hdr">{["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=><div key={d} className="cal-day-lbl">{d}</div>)}</div>
          <div className="cal-grid">
            {dynCal.map((cell,i)=>(
              <div key={i} className={`cal-cell${cell.today?" today":""}${cell.other?" other":""}`} onClick={()=>{if(!cell.other)setDayModal(cell.d);}}>
                <div className="cal-dn">{cell.d}</div>
                {cell.promos.slice(0,2).map((p,j)=>(
                  <div key={j} className="cal-chip" style={{color:p.color,background:p.color+"16"}}
                    onClick={()=>{const c=campaigns.find(x=>x.name===p.name);if(c){setCamp(c);setNav("campaign-detail");}}}>
                    {p.name.replace(" Sale","").replace(" Deals","").replace(" Blowout","").replace(" Drop","")}
                  </div>
                ))}
                {cell.promos.length>2&&<div style={{fontSize:8.5,color:"var(--dim)"}}>+{cell.promos.length-2}</div>}
                {!cell.other&&AI_HOLIDAYS.filter(h=>h.d===cell.d).map(h=>(
                  <div key={h.d} className="cal-chip" style={{color:confirmedHolidays.includes(h.d)?"#a78bfa":"#6b7280",background:confirmedHolidays.includes(h.d)?"rgba(139,92,246,.15)":"rgba(107,114,128,.08)",fontSize:8,display:"flex",alignItems:"center",gap:2,cursor:"default"}}
                    title={h.note}
                    onClick={e=>{e.stopPropagation();setConfirmedHolidays(prev=>prev.includes(h.d)?prev.filter(x=>x!==h.d):[...prev,h.d]);}}>
                    {h.icon} {h.label}{confirmedHolidays.includes(h.d)?" ✓":""}
                  </div>
                ))}
              </div>
            ))}
          </div>
          <div style={{padding:"10px 14px",borderTop:"1px solid var(--border)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
              <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                {campaigns.map(c=>(
                  <div key={c.id} style={{display:"flex",alignItems:"center",gap:5,fontSize:10.5,color:"var(--muted)"}}>
                    <div style={{width:7,height:7,borderRadius:2,background:c.color}}/>{c.name}
                  </div>
                ))}
              </div>
              <button className="btn btn-ghost btn-xs" onClick={()=>setShowLegend(v=>!v)}>🎨 Color Guide</button>
            </div>
            {showLegend&&(
              <div style={{marginTop:8,padding:"12px 14px",background:"var(--card2)",borderRadius:"var(--r)",border:"1px solid var(--border)"}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--dim)",marginBottom:8}}>Promo Type Color Guide</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                  {PROMO_TYPES.map(t=>(
                    <div key={t.id} style={{display:"flex",alignItems:"flex-start",gap:7}}>
                      <div style={{width:10,height:10,borderRadius:2,background:t.color,flexShrink:0,marginTop:2}}/>
                      <div>
                        <div style={{fontSize:11,fontWeight:600,color:"var(--text)"}}>{t.label}</div>
                        <div style={{fontSize:10,color:"var(--dim)",lineHeight:1.4}}>{t.desc}</div>
                      </div>
                    </div>
                  ))}
                  <div style={{display:"flex",alignItems:"flex-start",gap:7}}>
                    <div style={{width:10,height:10,borderRadius:2,background:"#6b7280",flexShrink:0,marginTop:2,opacity:.5}}/>
                    <div>
                      <div style={{fontSize:11,fontWeight:600,color:"var(--muted)"}}>AI Holiday Suggestions</div>
                      <div style={{fontSize:10,color:"var(--dim)"}}>Click to confirm — turns purple when active</div>
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <div className="panel">
            <div className="panel-hd">
              <div className="panel-title">All Campaigns</div>
              <span style={{fontSize:10.5,color:"var(--accent)",cursor:"pointer"}} onClick={()=>setNav("campaigns")}>List view →</span>
            </div>
            {campaigns.map(c=>(
              <div key={c.id} className="camp-row">
                <div className="camp-stripe" style={{background:c.color}}/>
                <div className="camp-info" style={{cursor:"pointer"}} onClick={()=>{setCamp(c);setNav("campaign-detail");}}>
                  <div className="camp-name" style={{fontSize:12.5}}>{c.name}</div>
                  <div className="camp-meta">{c.start} – {c.end}</div>
                </div>
                <span className={`pill ${statusCls(c.status)}`} style={{fontSize:8}}>{statusLbl(c.status)}</span>
                <span onClick={()=>removeCampaign(c.id)} title="Remove campaign" style={{color:"var(--dim)",cursor:"pointer",fontSize:13,padding:"0 4px",marginLeft:4}}>✕</span>
              </div>
            ))}
            <div style={{padding:"8px 14px",borderTop:"1px solid var(--border)"}}>
              <button className="btn btn-ghost btn-xs" style={{width:"100%",justifyContent:"center"}} onClick={()=>setAddModal(true)}>+ Add Campaign to Calendar</button>
            </div>
          </div>
          <div className="ai-panel panel">
            <div className="panel-hd" style={{borderBottom:"1px solid rgba(139,92,246,.15)"}}><div className="panel-title" style={{color:"#a78bfa"}}>🤖 Calendar Scan</div></div>
            <div className="panel-bd" style={{padding:"12px 14px",fontSize:11.5,color:"var(--muted)",lineHeight:1.6}}>
              <div style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(139,92,246,.1)"}}><span style={{color:"#f59e0b"}}>⚠ </span>Overlap: Spring Guitar + Easter share 68% email segment</div>
              <div style={{marginBottom:8,paddingBottom:8,borderBottom:"1px solid rgba(139,92,246,.1)"}}><span style={{color:"#10B981"}}>● </span>Drum Kit trending 23% above CTR benchmark</div>
              <div><span style={{color:"#f43f5e"}}>● </span>Late April gap: Apr 23–May 2 — no promos scheduled</div>
            </div>
          </div>
        </div>
      </div>

      {dayModal && !addModal && (
        <div className="overlay" onClick={()=>setDayModal(null)}>
          <div style={{background:"var(--card)",borderRadius:"var(--rl)",padding:24,maxWidth:340,width:"90%",boxShadow:"0 20px 60px rgba(0,0,0,.6)"}} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:11,color:"var(--dim)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:4}}>March {dayModal}, 2026</div>
            <div style={{fontSize:14,fontWeight:700,marginBottom:16}}>What would you like to add?</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
              <div onClick={()=>{setDayModalType("campaign");setNewPromo(p=>({...p,start:`Mar ${dayModal}`,end:`Mar ${dayModal}`}));setDayModal(null);setAddModal(true);}}
                style={{border:"1px solid var(--border2)",borderRadius:"var(--rl)",padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .13s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border2)"}>
                <div style={{fontSize:22,marginBottom:6}}>📋</div>
                <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>Campaign</div>
                <div style={{fontSize:10.5,color:"var(--muted)"}}>Full campaign with brief, timeline, tickets</div>
              </div>
              <div onClick={()=>{setDayModalType("promo");setNewPromo(p=>({...p,start:`Mar ${dayModal}`,end:`Mar ${dayModal}`}));setDayModal(null);setAddModal(true);}}
                style={{border:"1px solid var(--border2)",borderRadius:"var(--rl)",padding:"16px 12px",cursor:"pointer",textAlign:"center",transition:"all .13s"}}
                onMouseEnter={e=>e.currentTarget.style.borderColor="var(--accent)"}
                onMouseLeave={e=>e.currentTarget.style.borderColor="var(--border2)"}>
                <div style={{fontSize:22,marginBottom:6}}>⚡</div>
                <div style={{fontSize:12,fontWeight:700,marginBottom:2}}>Quick Promo</div>
                <div style={{fontSize:10.5,color:"var(--muted)"}}>Simple promo entry for calendar only</div>
              </div>
            </div>
            <button className="btn btn-ghost btn-sm" style={{width:"100%",justifyContent:"center"}} onClick={()=>setDayModal(null)}>Cancel</button>
          </div>
        </div>
      )}

      {addModal && (
        <div className="overlay" onClick={()=>setAddModal(false)}>
          <div className="modal" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
            <div className="modal-hd">
              <div className="modal-hd-body"><div className="modal-title">Add Promo to Calendar</div></div>
              <div className="modal-close" onClick={()=>setAddModal(false)}>✕</div>
            </div>
            <div className="modal-bd">
              <div className="fr2" style={{marginBottom:9}}>
                <div className="ffield"><div className="ffield-lbl">Campaign Name *</div><input className="ffield-input" placeholder="e.g. Summer Clearance" value={newPromo.name} onChange={e=>setNewPromo(p=>({...p,name:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Owner</div><input className="ffield-input" placeholder="e.g. Jamie R." value={newPromo.owner} onChange={e=>setNewPromo(p=>({...p,owner:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Start Date *</div><input className="ffield-input" placeholder="e.g. Mar 15" value={newPromo.start} onChange={e=>setNewPromo(p=>({...p,start:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">End Date *</div><input className="ffield-input" placeholder="e.g. Mar 22" value={newPromo.end} onChange={e=>setNewPromo(p=>({...p,end:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Revenue Target</div><input className="ffield-input" placeholder="e.g. $500,000" value={newPromo.target} onChange={e=>setNewPromo(p=>({...p,target:e.target.value}))}/></div>
              </div>
              <div className="ffield" style={{marginBottom:9}}><div className="ffield-lbl">Offer / Headline</div><input className="ffield-input" placeholder="e.g. Up to 30% off guitars" value={newPromo.offer} onChange={e=>setNewPromo(p=>({...p,offer:e.target.value}))}/></div>
              <div className="ffield" style={{marginBottom:9}}><div className="ffield-lbl">Goal</div><textarea className="ffield-input" rows={2} placeholder="Campaign objective…" value={newPromo.goal} onChange={e=>setNewPromo(p=>({...p,goal:e.target.value}))}/></div>
              <div className="ffield" style={{marginBottom:12}}>
                <div className="ffield-lbl">Status</div>
                <select className="ffield-select" value={newPromo.status} onChange={e=>setNewPromo(p=>({...p,status:e.target.value}))}>
                  {["planning","scheduled","live","review","draft"].map(s=><option key={s} value={s}>{statusLbl(s)}</option>)}
                </select>
              </div>
              <div style={{marginBottom:14}}>
                <div style={{fontSize:9,color:"var(--dim)",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:7,fontWeight:600}}>Campaign Color</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {COLORS.map(col=><div key={col} onClick={()=>setNewPromo(p=>({...p,color:col}))} style={{width:22,height:22,borderRadius:4,background:col,cursor:"pointer",border:newPromo.color===col?"2px solid white":"2px solid transparent"}}/>)}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setAddModal(false)}>Cancel</button>
                <button className="btn btn-primary btn-sm" onClick={saveNewPromo} disabled={!newPromo.name||!newPromo.start||!newPromo.end}>Add to Calendar</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

function CampaignsList({setNav,setCamp,campaigns=CAMPAIGNS,setNewCampOpen=()=>{}}){

  return(
    <>
      <div style={{display:"flex",gap:7,marginBottom:18,flexWrap:"wrap"}}>
        {["all","live","scheduled","review","draft"].map(f=>(
          <button key={f} className={`btn btn-sm ${filter===f?"btn-active":"btn-ghost"}`} onClick={()=>setFilter(f)}>{f.charAt(0).toUpperCase()+f.slice(1)}{f==="all"?` (${CAMPAIGNS.length})`:""}</button>
        ))}
        <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={()=>setNewCampOpen(true)}>+ New Campaign</button>
      </div>
      {filtered.map(c=>(
        <div key={c.id} className="panel mb16" style={{cursor:"pointer"}} onClick={()=>{setCamp(c);setNav("campaign-detail")}}>
          <div className="panel-hd">
            <div style={{display:"flex",alignItems:"center",gap:10,flex:1}}>
              <div style={{width:4,height:38,borderRadius:2,background:c.color,flexShrink:0}}/>

function EditableField({value, onChange, multiline=false, style={}}){
  const [editing, setEditing] = useState(false);
  const [val, setVal] = useState(value);
  const ref = React.useRef();
  useEffect(()=>{ if(editing && ref.current) ref.current.focus(); },[editing]);
  if(editing) {
    const props = {
      ref, value:val,
      onChange:e=>setVal(e.target.value),
      onBlur:()=>{ setEditing(false); onChange(val); },
      onKeyDown:e=>{ if(!multiline && e.key==="Enter"){ setEditing(false); onChange(val); } if(e.key==="Escape"){ setEditing(false); setVal(value); }},
      style:{background:"transparent",border:"none",borderBottom:"1px solid var(--accent)",outline:"none",color:"var(--text)",fontFamily:"inherit",fontSize:"inherit",fontWeight:"inherit",width:"100%",padding:"1px 2px",resize:"none",lineHeight:1.5,...style}
    };
    return multiline ? <textarea {...props} rows={3}/> : <input {...props}/>;
  }
  return <span onClick={()=>setEditing(true)} title="Click to edit" style={{cursor:"text",borderBottom:"1px dashed var(--border2)",paddingBottom:1,...style}}>{val||<span style={{color:"var(--dim)"}}>Click to edit…</span>}</span>;
}

function StatusSelect({value, onChange}){
  return(
    <select value={value} onChange={e=>onChange(e.target.value)}
      style={{background:"var(--card2)",border:"1px solid var(--border2)",borderRadius:4,color:"var(--text)",fontFamily:"'DM Sans',sans-serif",fontSize:11,padding:"3px 8px",cursor:"pointer",outline:"none"}}>
      {["planning","draft","scheduled","live","review","complete"].map(s=><option key={s} value={s}>{statusLbl(s)}</option>)}
    </select>
  );
}

function AssetPreview({asset, selected, onToggle}){
  const maxW=110, maxH=64;
  const ratio=asset.w/asset.h;
  let pw,ph;
  if(ratio>=maxW/maxH){pw=maxW;ph=Math.round(maxW/ratio);}
  else{ph=maxH;pw=Math.round(maxH*ratio);}
  pw=Math.max(pw,18);ph=Math.max(ph,10);
  return(
    <div onClick={onToggle} style={{cursor:"pointer",padding:"10px 8px",borderRadius:6,border:`1px solid ${selected?"var(--accent)":"var(--border)"}`,background:selected?"rgba(255,69,0,.07)":"var(--card2)",display:"flex",flexDirection:"column",alignItems:"center",gap:6,transition:"all .13s",minWidth:90,maxWidth:130,flex:"0 0 auto"}}>
      <div style={{width:maxW,height:maxH,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <div style={{width:pw,height:ph,background:selected?"rgba(255,69,0,.18)":"var(--surface)",border:`1.5px solid ${selected?"var(--accent)":"var(--border2)"}`,borderRadius:2,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",flexShrink:0}}>
          {selected&&<span style={{fontSize:9,color:"var(--accent)",fontWeight:700}}>✓</span>}
          <div style={{position:"absolute",bottom:-14,left:"50%",transform:"translateX(-50%)",fontSize:7,color:"var(--dim)",whiteSpace:"nowrap",fontFamily:"monospace"}}>{asset.w}×{asset.h}</div>
        </div>
      </div>
      <div style={{fontSize:10,fontWeight:selected?600:400,color:selected?"var(--accent)":"var(--muted)",textAlign:"center",lineHeight:1.3,marginTop:8}}>{asset.label}</div>
      <div style={{fontSize:9,color:"var(--dim)",textAlign:"center"}}>{asset.desc}</div>
    </div>
  );
}

            setPlacements(p=>[...p,key]);
            setSpecs(s=>[...s,{id:Date.now(),key,size:sizeEl.value.trim(),name:nameEl.value.trim()||sizeEl.value.trim(),done:false}]);
            sizeEl.value=""; nameEl.value="";
          }}>Add</button>
        </div>
      </div>
      {selectedCount>0&&(
        <div style={{marginTop:10,padding:"10px 14px",background:"rgba(255,69,0,.06)",border:"1px solid rgba(255,69,0,.2)",borderRadius:"var(--r)"}}>
          <div style={{fontSize:10,fontWeight:700,color:"var(--accent)",textTransform:"uppercase",letterSpacing:"1px",marginBottom:5}}>Selected Assets ({selectedCount})</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {placements.map(k=>{
              const asset=ASSET_LIBRARY.flatMap(c=>c.assets).find(a=>a.key===k);
              const custom=specs.find(s=>s.key===k&&!asset);
              const label=asset?`${asset.label} (${asset.w}×${asset.h})`:custom?`${custom.name} (${custom.size})`:"";
              return label?<span key={k} style={{fontSize:10,padding:"2px 9px",borderRadius:20,background:"rgba(255,69,0,.15)",color:"var(--accent)",fontWeight:500}}>{label}</span>:null;
            })}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── EMAIL CADENCE ── */
function EmailCadence(){
  const [typeFil,setTypeFil]=useState([]);
  const [campFil,setCampFil]=useState("All");
  const [search,setSearch]=useState("");
  const [selected,setSelected]=useState(null);
  const [syncUrl,setSyncUrl]=useState("");
  const [showLinkInput,setShowLinkInput]=useState(false);
  const [linkInput,setLinkInput]=useState("");
  const [refreshing,setRefreshing]=useState(false);
  const [lastRefresh,setLastRefresh]=useState(null);
  const [archive,setArchive]=useState([]);
  const handleRefresh=()=>{
    if(!syncUrl){setShowLinkInput(true);return;}
    setRefreshing(true);
    // Archive current entries before refresh
    setArchive(prev=>[...prev,{refreshedAt:new Date().toLocaleString(),count:EMAIL_SENDS.length}]);
    setTimeout(()=>{
      setRefreshing(false);
      setLastRefresh(new Date().toLocaleTimeString());
    },1800);
  };
  const allCamps=["All",...Array.from(new Set(EMAIL_SENDS.map(e=>e.campaign)))];
  const filtered=useMemo(()=>EMAIL_SENDS.filter(e=>{
    if(typeFil.length&&!typeFil.includes(e.type)) return false;
    if(campFil!=="All"&&e.campaign!==campFil) return false;
    if(search&&![e.subject,e.subLabel,e.campaign,e.audience].join(" ").toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  }),[typeFil,campFil,search]);
  const toggleType=t=>setTypeFil(f=>f.includes(t)?f.filter(x=>x!==t):[...f,t]);
  const counts={total:filtered.length,dedicated:filtered.filter(e=>e.type==="dedicated").length,feature:filtered.filter(e=>e.type==="feature").length,trigger:filtered.filter(e=>e.type==="trigger").length};
  return(
    <>
      <div className="sync-banner">
        <div className="sync-dot"/>
        <div style={{flex:1}}>
          <div style={{fontSize:12.5,fontWeight:500,color:syncUrl?"var(--green)":"var(--muted)"}}>Email Calendar — {syncUrl?`Connected · ${EMAIL_SENDS.length} sends loaded`:"No Link Connected"}</div>
          <div style={{fontSize:11,color:"var(--muted)",marginTop:1}}>{syncUrl?`Synced from: ${syncUrl}`:"Paste your SharePoint or Google Sheets link below to connect your email calendar"}{lastRefresh&&<span style={{marginLeft:8,color:"var(--green)"}}>· Last refreshed: {lastRefresh}</span>}{archive.length>0&&<span style={{marginLeft:8,color:"var(--dim)"}}>· {archive.length} archived refresh{archive.length>1?"es":""}</span>}</div>
        </div>
        {syncUrl
          ? <code style={{fontSize:9.5,color:"var(--muted)",background:"var(--card2)",padding:"3px 8px",borderRadius:4,border:"1px solid var(--border)",maxWidth:220,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{syncUrl}</code>
          : null}
        <button className="btn btn-ghost btn-sm" onClick={()=>setShowLinkInput(v=>!v)}>⚙ {syncUrl?"Change Link":"Connect Link"}</button>
      </div>
      {showLinkInput && (
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--rl)",padding:"14px 16px",marginBottom:14,display:"flex",gap:8,alignItems:"center"}}>
          <input
            style={{flex:1,background:"var(--card2)",border:"1px solid var(--border2)",borderRadius:"var(--r)",padding:"8px 12px",color:"var(--text)",fontFamily:"inherit",fontSize:12.5,outline:"none"}}
            placeholder="Paste SharePoint, Google Sheets, or Excel Online URL…"
            value={linkInput}
            onChange={e=>setLinkInput(e.target.value)}
            onKeyDown={e=>{if(e.key==="Enter"&&linkInput.trim()){setSyncUrl(linkInput.trim());setShowLinkInput(false);}}}
          />
          <button className="btn btn-primary btn-sm" onClick={()=>{if(linkInput.trim()){setSyncUrl(linkInput.trim());setShowLinkInput(false);}}}>Connect</button>
          {syncUrl && <button className="btn btn-ghost btn-sm" onClick={()=>{setSyncUrl("");setLinkInput("");setShowLinkInput(false);}}>Remove</button>}
          <button className="btn btn-ghost btn-sm" onClick={()=>setShowLinkInput(false)}>Cancel</button>
        </div>
      )}
      <div className="kpi-grid g4 mb16">
        {[{l:"Total Sends",v:counts.total,c:"#FF4500"},{l:"Dedicated",v:counts.dedicated,c:"#FF4500"},{l:"Features",v:counts.feature,c:"#3B82F6"},{l:"Triggered",v:counts.trigger,c:"#8B5CF6"}].map((k,i)=>(
          <div className="kpi" key={i} ><div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:k.c}}/>  <div className="kpi-lbl">{k.l}</div><div className="kpi-val">{k.v}</div></div>

          {["dedicated","feature","trigger"].map(t=>(

      </div>
      <div className="panel" style={{overflow:"hidden"}}>
        <div style={{overflowX:"auto",maxHeight:480,overflowY:"auto"}}>
          <table className="ec-table">
            <thead><tr><th>Date</th><th>Type</th><th>Subject / Details</th><th>Campaign</th><th>Audience</th><th>Time</th><th>OR</th><th>CTR</th></tr></thead>
            <tbody>
              {filtered.map(e=>(
                <tr key={e.id} onClick={()=>setSelected(e)}>
                  <td style={{whiteSpace:"nowrap"}}><div style={{fontSize:12,fontWeight:600}}>{e.date}</div></td>
                  <td><span className={`ec-badge ${e.type==="dedicated"?"ec-ded":e.type==="feature"?"ec-feat":"ec-trig"}`}>{e.type==="dedicated"?"● Dedicated":e.type==="feature"?"◆ Feature":"⚡ Auto"}</span></td>
                  <td style={{maxWidth:220}}><div style={{fontSize:12,fontWeight:500}}>{e.subject}</div>{e.subLabel&&<div style={{fontSize:10.5,color:"var(--muted)",marginTop:1}}>{e.subLabel}</div>}</td>
                  <td><div style={{fontSize:10,padding:"2px 7px",borderRadius:3,background:campColor(e.campaign)+"18",color:campColor(e.campaign),borderLeft:`2px solid ${campColor(e.campaign)}`,display:"inline-flex"}}>{e.campaign}</div></td>

                  <td>{e.ctr!=="—"?<span className={parseFloat(e.ctr)>5?"ec-good":"ec-avg"}>{e.ctr}</span>:<span className="ec-blank">—</span>}</td>

                <div className="mfield"><div className="mfield-lbl">Segment</div><div className="mfield-val mt">{selected.segment}</div></div>
                <div className="mfield"><div className="mfield-lbl">Open Rate</div><div className="mfield-val" style={{fontSize:22,fontFamily:"'Syne',sans-serif",fontWeight:800,color:selected.or==="—"?"var(--dim)":"var(--green)"}}>{selected.or}</div></div>
                <div className="mfield"><div className="mfield-lbl">CTR</div><div className="mfield-val" style={{fontSize:22,fontFamily:"'Syne',sans-serif",fontWeight:800,color:selected.ctr==="—"?"var(--dim)":"var(--blue)"}}>{selected.ctr}</div></div>
              </div>
              {selected.notes&&<div className="mfield"><div className="mfield-lbl">Notes</div><div className="mfield-val mt">{selected.notes}</div></div>}

          </div>
        </div>

    </>
  );

function Tasks({currentUser, onTaskNotify}){
  const [tasks,setTasks]=useState(TASKS_DATA);
  const [privateTasks,setPrivateTasks]=useState([]); // only visible to currentUser this session
  const [viewMode,setViewMode]=useState("mine"); // "mine" | "all"
  const [roleFil,setRoleFil]=useState("All");
  const [addOpen,setAddOpen]=useState(false);
  const [newTask,setNewTask]=useState({text:"",campaign:"",due:"",assignedTo:"",isPrivate:false});
  const [tagInput,setTagInput]=useState("");
  const [tags,setTags]=useState([]);
  const [showSug,setShowSug]=useState(false);

  const CAMPAIGNS_T=["Spring Guitar Sale","NAMM Gear Drop","Drum Kit Blowout","Easter Weekend Deals"];
  const roles=["All","Marketing","Design","Web","Analytics","Director"];

  // Filter logic: "mine" = tasks assigned to or created by me + my private tasks
  const sharedFiltered = viewMode==="mine"
    ? tasks.filter(t=>!t.assignedTo || t.assignedTo===currentUser?.id || t.createdBy===currentUser?.id || t.role===currentUser?.role)
    : tasks;
  const visiblePrivate = viewMode==="mine" ? privateTasks : [];
  const allVisible = [...sharedFiltered, ...visiblePrivate];
  const filtered = roleFil==="All" ? allVisible : allVisible.filter(t=>t.role===roleFil||t.isPrivate);

  const toggle=id=>{
    if(privateTasks.find(t=>t.id===id)) setPrivateTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
    else setTasks(ts=>ts.map(t=>t.id===id?{...t,done:!t.done}:t));
  };
  const removeTask=id=>{
    if(privateTasks.find(t=>t.id===id)) setPrivateTasks(ts=>ts.filter(t=>t.id!==id));
    else setTasks(ts=>ts.filter(t=>t.id!==id));
  };

  const handleTagKey=e=>{
    if(e.key===" "||e.key==="Enter"){
      const v=tagInput.trim();
      if(v){setTags(t=>[...t,v]);setTagInput("");}
      e.preventDefault();
    } else if(e.key==="Backspace"&&!tagInput&&tags.length){
      setTags(t=>t.slice(0,-1));
    }
  };

  const addMention=m=>{
    setTags(t=>[...t,m]);
    setTagInput("");
    setShowSug(false);
  };

  const submitTask=(makePrivate=false)=>{
    if(!newTask.text.trim()) return;
    const assignee=TEAM_MEMBERS.find(m=>m.id===newTask.assignedTo)||currentUser;
    const task={
      id:Date.now(),
      text:newTask.text,
      campaign:newTask.campaign||"General",
      role:currentUser?.role||"Marketing",
      due:newTask.due||"TBD",
      owner:currentUser?.name||"Me",
      ownerColor:currentUser?.color||"#FF4500",
      assignedTo:newTask.assignedTo||currentUser?.id,
      createdBy:currentUser?.id,
      isPrivate:makePrivate,
      dueStatus:"ok",
      done:false,
      tags
    };
    if(makePrivate){
      setPrivateTasks(ts=>[...ts,task]);
    } else {
      setTasks(ts=>[...ts,task]);
      // Notify assignee if different from creator
      if(newTask.assignedTo && newTask.assignedTo!==currentUser?.id && onTaskNotify){
        const m=TEAM_MEMBERS.find(x=>x.id===newTask.assignedTo);
        if(m) onTaskNotify({toId:m.id,icon:"📋",color:m.color,title:"New task assigned to you",body:`${newTask.text} — ${newTask.campaign||"General"} · Due ${newTask.due||"TBD"}`});
      }
    }
    setNewTask({text:"",campaign:"",due:"",assignedTo:"",isPrivate:false});
    setTags([]);
    setTagInput("");
    setAddOpen(false);
  };

  const TEAM_HANDLE=TEAM_MEMBERS.map(m=>"@"+m.name);
  const atSuggestions=tagInput.startsWith("@")?TEAM_HANDLE.filter(m=>m.toLowerCase().includes(tagInput.toLowerCase())):[]);

  return(
    <>
      <div className="kpi-grid g2 mb16">
        {[{l:"Open Tasks",v:tasks.filter(t=>!t.done).length,c:"#FF4500"},{l:"Completed",v:tasks.filter(t=>t.done).length,c:"#10B981"}].map((k,i)=>(
          <div className="kpi" key={i}><div style={{position:"absolute",top:0,left:0,right:0,height:"2px",background:k.c}}/><div className="kpi-lbl">{k.l}</div><div className="kpi-val">{k.v}</div></div>
        ))}
      </div>
      <div style={{marginBottom:12,padding:"10px 14px",background:"rgba(255,69,0,.06)",border:"1px solid rgba(255,69,0,.15)",borderRadius:8,display:"flex",alignItems:"center",gap:10}}>
        <div style={{width:30,height:30,borderRadius:"50%",background:currentUser?.color||"#FF4500",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"white",flexShrink:0}}>{currentUser?.initials||"?"}</div>
        <div style={{flex:1}}>
          <div style={{fontSize:12,fontWeight:600}}>{currentUser?.name} · {currentUser?.role}</div>
          <div style={{fontSize:10.5,color:"var(--muted)"}}>
            {viewMode==="mine"?`${filtered.length} task${filtered.length!==1?"s":""} in your view`:`${filtered.length} total team tasks`}
            {privateTasks.length>0&&viewMode==="mine"&&<span style={{marginLeft:6,color:"var(--dim)"}}>· {privateTasks.length} private 🔒</span>}
          </div>
        </div>
        <div style={{display:"flex",gap:3,background:"var(--card2)",borderRadius:6,padding:3}}>
          {["mine","all"].map(m=>(
            <button key={m} onClick={()=>setViewMode(m)}
              style={{padding:"4px 11px",borderRadius:4,border:"none",cursor:"pointer",fontSize:11,fontWeight:600,
                background:viewMode===m?"var(--accent)":"transparent",color:viewMode===m?"white":"var(--muted)"}}>
              {m==="mine"?"My Tasks":"All Tasks"}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:"flex",gap:7,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
        {roles.map(r=><button key={r} className={`btn btn-sm ${roleFil===r?"btn-active":"btn-ghost"}`} onClick={()=>setRoleFil(r)}>{r}</button>)}
        <button className="btn btn-primary btn-sm" style={{marginLeft:"auto"}} onClick={()=>setAddOpen(true)}>+ Add Task</button>
      </div>

      {addOpen&&(
        <div className="panel" style={{marginBottom:14,padding:16}}>
          <div style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",color:"var(--dim)",marginBottom:10}}>New Task</div>
          <textarea
            className="ffield-input"
            rows={2}
            placeholder="Describe the task…"
            value={newTask.text}
            onChange={e=>setNewTask(p=>({...p,text:e.target.value}))}
            style={{marginBottom:9,width:"100%"}}
          />
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:9}}>
            <div className="ffield"><div className="ffield-lbl">Campaign</div>
              <select className="ffield-select" value={newTask.campaign} onChange={e=>setNewTask(p=>({...p,campaign:e.target.value}))}>
                <option value="">— None —</option>
                {CAMPAIGNS_T.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div className="ffield"><div className="ffield-lbl">Assign To</div>
              <select className="ffield-select" value={newTask.assignedTo} onChange={e=>setNewTask(p=>({...p,assignedTo:e.target.value}))}>
                <option value="">Just me ({currentUser?.name})</option>
                {TEAM_MEMBERS.filter(m=>m.id!==currentUser?.id).map(m=><option key={m.id} value={m.id}>{m.name} — {m.role}</option>)}
              </select>
            </div>
            <div className="ffield"><div className="ffield-lbl">Due Date</div>
              <input className="ffield-input" placeholder="e.g. Mar 20" value={newTask.due} onChange={e=>setNewTask(p=>({...p,due:e.target.value}))}/>
            </div>
          </div>
          <div className="ffield" style={{marginBottom:10,position:"relative"}}>
            <div className="ffield-lbl">Tags & Mentions — type @ to mention someone, # for a topic, Space to add</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:5,padding:"6px 10px",background:"var(--card2)",border:"1px solid var(--border2)",borderRadius:"var(--r)",minHeight:38,alignItems:"center"}}>
              {tags.map((t,i)=>(
                <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,padding:"2px 8px",borderRadius:20,background:t.startsWith("@")?"#FF450022":"#3B82F622",color:t.startsWith("@")?"#FF4500":"#60a5fa",fontSize:11,fontWeight:600}}>
                  {t}<span style={{cursor:"pointer",opacity:.6}} onClick={()=>setTags(tg=>tg.filter((_,j)=>j!==i))}>✕</span>
                </span>
              ))}
              <input
                style={{border:"none",background:"transparent",outline:"none",color:"var(--text)",fontFamily:"inherit",fontSize:12,minWidth:120,flex:1}}
                placeholder={tags.length===0?"@mention or #tag…":""}
                value={tagInput}
                onChange={e=>{setTagInput(e.target.value);setShowSug(e.target.value.startsWith("@"));}}
                onKeyDown={handleTagKey}
              />
            </div>
            {showSug&&atSuggestions.length>0&&(
              <div style={{position:"absolute",top:"100%",left:0,right:0,background:"var(--card)",border:"1px solid var(--border)",borderRadius:"var(--r)",zIndex:99,overflow:"hidden"}}>
                {atSuggestions.map(m=>(
                  <div key={m} style={{padding:"8px 12px",cursor:"pointer",fontSize:12,color:"var(--text)"}} onClick={()=>addMention(m)}
                    onMouseEnter={e=>e.target.style.background="var(--card2)"}
                    onMouseLeave={e=>e.target.style.background="transparent"}>
                    {m}
                  </div>
                ))}
              </div>
            )}
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn btn-ghost btn-sm" onClick={()=>{setAddOpen(false);setTags([]);setTagInput("");}}>Cancel</button>
            <button className="btn btn-ghost btn-sm" onClick={()=>submitTask(true)} disabled={!newTask.text.trim()} title="Only you can see this task">🔒 Private</button>
            <button className="btn btn-primary btn-sm" onClick={()=>submitTask(false)} disabled={!newTask.text.trim()} title="Visible to whole team">👥 Shared</button>
          </div>
        </div>
      )}

      <div className="panel">
        <div className="panel-bd" style={{padding:"4px 14px"}}>
          {filtered.length===0&&<div style={{padding:"20px 0",textAlign:"center",color:"var(--dim)",fontSize:12}}>No tasks in this category</div>}
          {filtered.map((t,i)=>(
            <div key={t.id} className="task-item">
              <div className={`task-check${t.done?" done":""}`} onClick={()=>toggle(t.id)}>{t.done?"✓":""}</div>
              <div style={{flex:1}}>
                <div className={`task-txt${t.done?" done":""}`}>{t.text}</div>
                <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:3,alignItems:"center"}}>
                  {t.campaign&&<span style={{fontSize:10,color:"var(--muted)"}}>{t.campaign}</span>}
                  {(t.tags||[]).map((tg,j)=>(
                    <span key={j} style={{fontSize:10,padding:"1px 6px",borderRadius:20,background:tg.startsWith("@")?"#FF450018":"#3B82F618",color:tg.startsWith("@")?"#FF4500":"#60a5fa",fontWeight:600}}>{tg}</span>
                  ))}
                </div>
              </div>
              <span className="task-owner" style={{borderLeft:`2px solid ${t.ownerColor||"#666"}`,background:"transparent"}}>{t.owner}</span>
              <span className={`task-due due-${t.dueStatus}`}>{t.due}</span>
              <span onClick={()=>removeTask(t.id)} style={{color:"var(--dim)",cursor:"pointer",fontSize:12,padding:"0 2px"}}>✕</span>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

/* ── AI ASSISTANT ── */
function AIAssistant(){
  const [chat,setChat]=useState(CHAT_INIT);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const QUICK=["What's our best Q4 performer?","Find calendar gaps in April","Draft Spring Guitar email subject lines","Summarize Drum Kit Blowout performance","What campaigns need design tickets?"];
  const send=(msg)=>{
    if(!msg.trim()) return;
    setChat(c=>[...c,{role:"user",text:msg}]);
    setInput("");
    setLoading(true);
    setTimeout(()=>{
      setChat(c=>[...c,{role:"ai",text:"Based on your current promotional calendar and past performance data, here's what I found: The Drum Kit Blowout is your strongest active campaign at 23% above CTR benchmarks. For Spring Guitar Sale, I recommend a 3-touch email drip — launch, mid-point urgency, and last-chance — similar to the Holiday Bundle structure from Q4 which drove $2.1M. Want me to generate the full campaign brief or draft the email subject lines?"}]);
      setLoading(false);
    },900);
  };
  return(
    <div style={{maxWidth:740}}>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {QUICK.map(q=><button key={q} className="btn btn-ghost btn-sm" onClick={()=>send(q)} style={{fontSize:11}}>{q}</button>)}
      </div>
      <div className="panel">
        <div className="panel-hd"><div className="panel-title" style={{color:"#a78bfa"}}>🤖 Promo Intelligence — AI Assistant</div></div>
        <div className="panel-bd">
          <div className="chat-wrap">
            <div className="chat-msgs">
              {chat.map((m,i)=>(
                <div key={i} className={`chat-bubble ${m.role}`}>
                  {m.role==="ai"&&<div className="chat-sender">Promo AI</div>}
                  {m.text}
                </div>
              ))}
              {loading&&<div className="chat-bubble ai"><div className="chat-sender">Promo AI</div><span style={{color:"var(--dim)"}}>Thinking…</span></div>}
            </div>
            <div className="chat-input-row">
              <input className="chat-input" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send(input)} placeholder="Ask about campaigns, gaps, copy, performance, tickets…"/>
              <button className="chat-send" onClick={()=>send(input)}>↑</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

        <div style={{fontSize:13,fontWeight:700}}>🔔 Notifications{mine.length>0&&<span style={{marginLeft:6,background:"var(--accent)",color:"white",borderRadius:20,padding:"1px 7px",fontSize:10,fontWeight:700}}>{mine.length}</span>}</div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {mine.length>0&&<span style={{fontSize:11,color:"var(--muted)",cursor:"pointer"}} onClick={onDismissAll}>Clear all</span>}
          <span style={{cursor:"pointer",color:"var(--dim)",fontSize:14}} onClick={onClose}>✕</span>
        </div>
      </div>
      <div style={{maxHeight:380,overflowY:"auto"}}>
        {mine.length===0
          ? <div style={{padding:"24px 16px",textAlign:"center",color:"var(--dim)",fontSize:12}}>No new notifications</div>
          : mine.map((n,i)=>(
            <div key={n.id} style={{padding:"12px 16px",borderBottom:"1px solid var(--border)",display:"flex",gap:10,alignItems:"flex-start",background:n.read?"transparent":"rgba(255,69,0,.04)"}}>
              <div style={{width:32,height:32,borderRadius:"50%",background:n.color||"var(--accent)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,flexShrink:0}}>{n.icon||"🔔"}</div>
              <div style={{flex:1}}>
                <div style={{fontSize:12,fontWeight:n.read?400:600,color:"var(--text)",marginBottom:2}}>{n.title}</div>
                <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.4}}>{n.body}</div>
                <div style={{fontSize:10,color:"var(--dim)",marginTop:4}}>{n.time}</div>
              </div>
              <span style={{cursor:"pointer",color:"var(--dim)",fontSize:12,padding:"2px 4px"}} onClick={()=>onDismiss(n.id)}>✕</span>
            </div>
          ))
        }
      </div>
      <div style={{padding:"10px 16px",borderTop:"1px solid var(--border)",fontSize:11,color:"var(--dim)",textAlign:"center"}}>
        Notifications are in-session only · No email alerts yet
      </div>
    </div>
  );
}

// Global in-session ticket store (resets on page refresh - no backend needed)
let SESSION_TICKETS = [];

function App(){
  const [currentUser, setCurrentUser] = useState(null);
  const [nav,setNav]=useState("dashboard");
  const [camp,setCamp]=useState(null);
  const [campaigns,setCampaigns]=useState(CAMPAIGNS);
  const [newCampOpen,setNewCampOpen]=useState(false);
  const [submittedTickets,setSubmittedTickets]=useState([]);
  const [toast,setToast]=useState(null);
  const [notifications,setNotifications]=useState([]);
  const [inboxOpen,setInboxOpen]=useState(false);
  const [myTasks,setMyTasks]=useState({}); // keyed by userId

  const showToast=(msg,color="#10B981")=>{setToast({msg,color});setTimeout(()=>setToast(null),3500);};
  const COLORS_NC=["#FF4500","#F59E0B","#10B981","#3B82F6","#8B5CF6","#F43F5E","#06B6D4","#84CC16"];
  const blankCamp={name:"",start:"",end:"",color:"#FF4500",status:"scheduled",owner:"",target:"",goal:"",offer:"",audience:"",channels:[],tags:[],assets:[],timeline:[]};
  const [newCamp,setNewCamp]=useState(blankCamp);

  const handleLogin=(user)=>{
    setCurrentUser(user);
    // Welcome notification
    setNotifications([{
      id:Date.now(),toId:user.id,icon:"👋",color:user.color,
      title:`Welcome back, ${user.name.split(" ")[0]}!`,
      body:`You have ${TASKS_DATA.filter(t=>t.role===user.role&&!t.done).length} open tasks. Check your task list.`,
      time:"Just now",read:false
    }]);
  };

  const pushNotification=(n)=>{
    setNotifications(prev=>[{...n,id:Date.now(),time:"Just now",read:false},...prev]);
  };

  const dismissNotification=(id)=>setNotifications(prev=>prev.filter(n=>n.id!==id));
  const dismissAll=()=>setNotifications(prev=>prev.filter(n=>n.toId!==currentUser?.id&&n.toId!=="all"));

  const unreadCount = notifications.filter(n=>(n.toId===currentUser?.id||n.toId==="all")&&!n.read).length;

  const updateCampaign=(updated)=>{setCampaigns(cs=>cs.map(c=>c.id===updated.id?updated:c));setCamp(updated);};
  const updateCampaigns=(newList)=>setCampaigns(newList);
  const saveNewCamp=()=>{
    if(!newCamp.name||!newCamp.start||!newCamp.end) return;
    const nc={...newCamp,id:Date.now()};
    setCampaigns(cs=>[...cs,nc]);
    setNewCamp(blankCamp);
    setNewCampOpen(false);
    setCamp(nc);
    setNav("campaign-detail");
    showToast("Campaign created!");
  };

  const title=()=>{
    if(nav==="campaign-detail"&&camp) return <><span className="tb-crumb" onClick={()=>setNav("campaigns")}>Campaigns</span><span className="tb-sep">/</span><span style={{fontSize:12,color:"var(--text)"}}>{camp.name}</span></>;
    return PAGE_TITLES[nav]||nav;
  };

  // Show login if no user selected
  if(!currentUser) return <LoginScreen onLogin={handleLogin}/>;

  return(
    <>
      {toast&&<div style={{position:"fixed",bottom:24,right:24,background:toast.color,color:"white",padding:"12px 20px",borderRadius:8,fontSize:13,fontWeight:600,zIndex:9999,boxShadow:"0 4px 20px rgba(0,0,0,.4)",display:"flex",alignItems:"center",gap:8,maxWidth:340}}>✓ {toast.msg}</div>}
      <NotificationInbox user={currentUser} notifications={notifications} onDismiss={dismissNotification} onDismissAll={dismissAll} open={inboxOpen} onClose={()=>setInboxOpen(false)}/>
      <div className="app">
        <div className="sb">
          <div className="sb-logo">
            <div className="sb-mark"><span className="sb-pip"/>MF Promo Hub</div>
            <div className="sb-sub">Musicians Friend</div>
          </div>
          <nav className="sb-nav">
            {NAV_GROUPS.map(g=>(
              <div className="sb-grp" key={g.label}>
                <div className="sb-grp-lbl">{g.label}</div>
                {g.items.map(item=>(
                  <div key={item.id} className={`sb-item${(nav===item.id||(nav==="campaign-detail"&&item.id==="campaigns"))?" active":""}`} onClick={()=>setNav(item.id)}>
                    <span className="sb-ico">{item.icon}</span>
                    {item.label}
                    {item.badge&&<span className="sb-badge">{item.badge}</span>}
                    {item.live&&<span className="sb-live">LIVE</span>}
                  </div>
                ))}
              </div>
            ))}
          </nav>
          <div className="sb-user" style={{cursor:"pointer"}} onClick={()=>setCurrentUser(null)} title="Switch user">
            <div className="sb-av" style={{background:currentUser.color}}>{currentUser.initials}</div>
            <div style={{flex:1}}>
              <div className="sb-un">{currentUser.name}</div>
              <div className="sb-ur">{currentUser.role}</div>
            </div>
            <div style={{fontSize:9,color:"var(--dim)",marginLeft:4}}>switch</div>
          </div>
        </div>
        <div className="main">
          <div className="topbar">
            <div className="tb-title">{title()}</div>
            <span style={{fontSize:11,color:"var(--muted)"}}>March 2026</span>
            {nav==="email"&&<span style={{fontSize:10.5,color:"var(--green)",display:"flex",alignItems:"center",gap:4}}><span style={{width:5,height:5,borderRadius:"50%",background:"var(--green)"}}/> Synced</span>}
            <button className="btn btn-ghost btn-sm">Export</button>
            <button className="btn btn-ghost btn-sm" style={{position:"relative",padding:"5px 10px"}} onClick={()=>setInboxOpen(v=>!v)}>
              🔔
              {unreadCount>0&&<span style={{position:"absolute",top:2,right:2,background:"var(--accent)",color:"white",borderRadius:"50%",width:14,height:14,fontSize:9,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{unreadCount}</span>}
            </button>
            <button className="btn btn-primary btn-sm" onClick={()=>setNewCampOpen(true)}>+ New Campaign</button>
          </div>
          <div className="page">
            {nav==="dashboard"&&<Dashboard setNav={setNav} setCamp={setCamp} campaigns={campaigns}/>}
            {nav==="calendar"&&<PromoCalendar setNav={setNav} setCamp={setCamp} campaigns={campaigns} onUpdateCampaigns={updateCampaigns}/>}
            {nav==="campaigns"&&<CampaignsList setNav={setNav} setCamp={setCamp} campaigns={campaigns} setNewCampOpen={setNewCampOpen}/>}
            {nav==="campaign-detail"&&<CampaignDetail campaign={camp} setNav={setNav} onUpdate={updateCampaign} onTicketSubmit={handleTicketSubmit} currentUser={currentUser} onTaskNotify={pushNotification}/>}
            {nav==="email"&&<EmailCadence/>}
            {nav==="tickets"&&<Tickets/>}
            {nav==="tasks"&&<Tasks currentUser={currentUser} onTaskNotify={pushNotification}/>}
            {nav==="automation"&&<Automation/>}
            {nav==="ai"&&<AIAssistant/>}
            {nav==="performance"&&<Performance/>}
          </div>
        </div>
      </div>

      {newCampOpen&&(
        <div className="overlay" onClick={()=>setNewCampOpen(false)}>
          <div className="modal" style={{maxWidth:560}} onClick={e=>e.stopPropagation()}>
            <div className="modal-hd">
              <div className="modal-hd-body"><div className="modal-title">New Campaign</div></div>
              <div className="modal-close" onClick={()=>setNewCampOpen(false)}>✕</div>
            </div>
            <div className="modal-bd">
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:9}}>
                <div className="ffield" style={{gridColumn:"1/-1"}}><div className="ffield-lbl">Campaign Name *</div><input className="ffield-input" placeholder="e.g. Summer Guitar Sale" value={newCamp.name} onChange={e=>setNewCamp(p=>({...p,name:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Start Date *</div><input className="ffield-input" placeholder="e.g. Apr 1" value={newCamp.start} onChange={e=>setNewCamp(p=>({...p,start:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">End Date *</div><input className="ffield-input" placeholder="e.g. Apr 10" value={newCamp.end} onChange={e=>setNewCamp(p=>({...p,end:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Owner</div><input className="ffield-input" placeholder="e.g. Jamie R." value={newCamp.owner} onChange={e=>setNewCamp(p=>({...p,owner:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Revenue Target</div><input className="ffield-input" placeholder="e.g. $500,000" value={newCamp.target} onChange={e=>setNewCamp(p=>({...p,target:e.target.value}))}/></div>
                <div className="ffield"><div className="ffield-lbl">Status</div>
                  <select className="ffield-select" value={newCamp.status} onChange={e=>setNewCamp(p=>({...p,status:e.target.value}))}>
                    {["scheduled","live","review","draft"].map(s=><option key={s} value={s}>{statusLbl(s)}</option>)}
                  </select>
                </div>
              </div>
              <div className="ffield" style={{marginBottom:9}}><div className="ffield-lbl">Offer / Headline</div><input className="ffield-input" placeholder="e.g. Up to 40% off guitars" value={newCamp.offer} onChange={e=>setNewCamp(p=>({...p,offer:e.target.value}))}/></div>
              <div className="ffield" style={{marginBottom:9}}><div className="ffield-lbl">Goal</div><textarea className="ffield-input" rows={2} placeholder="Campaign objective…" value={newCamp.goal} onChange={e=>setNewCamp(p=>({...p,goal:e.target.value}))}/></div>
              <div className="ffield" style={{marginBottom:14}}><div className="ffield-lbl">Target Audience</div><input className="ffield-input" placeholder="e.g. Guitar players, beginners" value={newCamp.audience} onChange={e=>setNewCamp(p=>({...p,audience:e.target.value}))}/></div>
              <div style={{marginBottom:16}}>
                <div style={{fontSize:9,color:"var(--dim)",textTransform:"uppercase",letterSpacing:"1.2px",marginBottom:7,fontWeight:600}}>Campaign Color</div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                  {COLORS_NC.map(col=><div key={col} onClick={()=>setNewCamp(p=>({...p,color:col}))} style={{width:24,height:24,borderRadius:5,background:col,cursor:"pointer",border:newCamp.color===col?"2px solid white":"2px solid transparent"}}/>)}
                </div>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button className="btn btn-ghost btn-sm" onClick={()=>setNewCampOpen(false)}>Cancel</button>
                <button className="btn btn-primary btn-sm" onClick={saveNewCamp} disabled={!newCamp.name||!newCamp.start||!newCamp.end}>Create Campaign →</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App, null));
</script>
</body>
</html>
